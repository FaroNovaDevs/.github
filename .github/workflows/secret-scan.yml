name: Secret Scan

on:
  workflow_call:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan (verified secrets only)
        id: scan
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified --results=json

      - name: Collect results and open Issue
        if: steps.scan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 8);
            const pusher = context.actor;
            const commitUrl = `https://github.com/${owner}/${repo}/commit/${context.sha}`;

            const title = `🚨 Secrets detectados en ${repo} (branch: ${branch})`;

            // Check if there's already an open issue with same title
            const existing = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'security,secrets',
              per_page: 10
            });
            const duplicate = existing.data.find(i => i.title === title);
            if (duplicate) {
              // Add comment to existing issue instead
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: duplicate.number,
                body: `Nuevo push con secrets detectados:\n- **Commit:** [${sha}](${commitUrl})\n- **Branch:** \`${branch}\`\n- **Autor:** @${pusher}\n- **Fecha:** ${new Date().toISOString()}`
              });
              core.warning(`Secret detectado — comentario agregado al Issue #${duplicate.number}`);
              return;
            }

            // Create labels if they don't exist
            for (const label of ['security', 'secrets']) {
              try {
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: label,
                  color: label === 'security' ? 'd73a4a' : 'fbca04'
                });
              } catch (e) {
                // Label already exists
              }
            }

            const body = `## 🚨 Secrets detectados por TruffleHog

**Repositorio:** \`${owner}/${repo}\`
**Branch:** \`${branch}\`
**Commit:** [${sha}](${commitUrl})
**Autor del push:** @${pusher}
**Fecha:** ${new Date().toISOString()}

### Que hacer

1. **Rotar el secret inmediatamente** — asume que esta comprometido
2. **Eliminar del codigo** — usar AWS Secrets Manager o variables de entorno
3. **Limpiar el historial de git** si es necesario (consultar con David)
4. **Cerrar este Issue** cuando el secret haya sido rotado y eliminado

### Referencia

- [Catalogo de secrets](https://github.com/FaroNovaDevs/recursos-compartidos) — ver Certainty/CLAUDE.md
- Los secrets deben vivir en AWS Secrets Manager, nunca en codigo

---
*Detectado automaticamente por [TruffleHog](https://github.com/trufflesecurity/trufflehog) via GitHub Actions*`;

            const issue = await github.rest.issues.create({
              owner, repo,
              title,
              body,
              labels: ['security', 'secrets']
            });

            core.error(`🚨 Secrets detectados — Issue abierto: ${issue.data.html_url}`);
